name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          
      - name: Install Frontend Dependencies
        run: npm install
        
      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Valorant Store Viewer ${{ github.ref_name }}'
          releaseBody: 'Automatic release of version ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false

      - name: Upload Portable Executable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The tauri-action creates a release (draft by default)
          # We can use the gh cli to upload the raw executable to the same release
          cp src-tauri/target/release/valorant-store-viewer.exe Valorant-Store-Viewer-Portable.exe
          gh release upload ${{ github.ref_name }} Valorant-Store-Viewer-Portable.exe --clobber
